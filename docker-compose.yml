version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: vanguard-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: vanguard-backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - DATABASE_URL=sqlite+aiosqlite:///./vanguard.db
    volumes:
      - ./backend:/app
      - db_data:/app/data
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: vanguard-frontend
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
  db_data:
